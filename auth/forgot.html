<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - UltraCRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F3F4F6;
            --bg-surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --focus-ring: rgba(37, 99, 235, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #EFF6FF 0%, #F3F4F6 100%);
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .auth-container { 
            background: var(--bg-surface); 
            width: 100%; 
            max-width: 400px; 
            padding: 3rem 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            border: 1px solid var(--border-color); 
        }
        .logo { 
            font-size: 1.75rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 2.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.75rem; 
            text-decoration: none;
            letter-spacing: -0.025em;
        }
        .logo svg { width: 32px; height: 32px; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #111827; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .form-group { margin-bottom: 2rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #374151; }
        .form-group input { 
            width: 100%; 
            padding: 0.75rem 1rem; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            font-size: 0.9375rem; 
            font-family: inherit; 
            transition: all 0.2s; 
            outline: none; 
            background: #F9FAFB;
        }
        .form-group input:focus { 
            border-color: var(--primary); 
            background: #FFFFFF;
            box-shadow: 0 0 0 4px var(--focus-ring); 
        }
        .btn-primary { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 0.875rem; 
            border-radius: 10px; 
            font-size: 0.9375rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .back-link { display: block; text-align: center; font-size: 0.875rem; color: var(--text-muted); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="../index.html" class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            UltraCRM
        </a>
        <div class="header">
            <h1>Recuperar Senha</h1>
            <p>Enviaremos um link de recuperação para o seu e-mail cadastrado.</p>
        </div>
        <form action="../index.html">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="btn-primary">Enviar Instruções</button>
            <a href="../index.html" class="back-link">Voltar para o login</a>
        </form>
    </div>
</body>
</html>
