<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UltraCRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F9FAFB;
            --bg-surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --focus-ring: rgba(37, 99, 235, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { background: var(--bg-surface); width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); border: 1px solid var(--border-color); }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .logo svg { width: 24px; height: 24px; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.875rem; font-family: inherit; transition: all 0.2s; outline: none; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--focus-ring); }
        .forgot-link { display: block; text-align: right; font-size: 0.875rem; color: var(--primary); text-decoration: none; font-weight: 500; margin-bottom: 1.5rem; }
        .forgot-link:hover { text-decoration: underline; }
        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary:hover { background: var(--primary-hover); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            UltraCRM
        </div>
        <div class="header">
            <h1>Bem-vindo de volta</h1>
            <p>Insira suas credenciais para acessar a conta</p>
        </div>
        <form action="../index.html">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="nome@empresa.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <a href="forgot.html" class="forgot-link">Esqueceu a senha?</a>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
    </div>
</body>
</html>
