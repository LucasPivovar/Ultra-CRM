<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - UltraCRM</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">

                <a href="index.html" class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    <h2>UltraCRM</h2>
                </a>
                <div class="close-sidebar" id="closeSidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
            <nav class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Visão Geral</a></li>
                <li class="nav-item"><a href="leads.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Leads</a></li>
                <li class="nav-item"><a href="campanhas.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg> Campanhas</a></li>
                <li class="nav-item"><a href="redirecionamento.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Redirecionamento</a></li>
                <li class="nav-item"><a href="usuarios.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg> Usuários</a></li>
            </nav>
            <div class="sidebar-footer">
                <a href="conta.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Minha Conta</a>
                <a href="index.html" class="nav-link" style="margin-top: 0.5rem;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Sair</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div style="display: flex; align-items: center;">
                    <div class="mobile-toggle" id="mobileToggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </div>
                </div>
                <div class="top-nav-right">
                    <a href="conta.html" style="text-decoration: none; color: inherit;">
                        <div class="user-profile">
                            <div class="user-avatar">PV</div>
                            <div class="user-info">
                                <span>Pato Vilo</span>
                            </div>
                        </div>
                    </a>
                </div>
            </header>

            <div class="container">
                <div class="page-header">
                    <div>
                        <h1>Minha Conta</h1>
                        <p>Gerencie suas configurações de acesso e segurança.</p>
                    </div>
                </div>

                <div class="account-grid">
                    <!-- Profile Settings -->
                    <div class="card-table" style="padding: 1.5rem; align-self: start;">
                        <div class="card-header" style="margin-bottom: 1.5rem; border-bottom: none; padding-bottom: 0;">
                            <h3 style="font-size: 1.25rem;">Dados do Perfil</h3>
                        </div>
                        <form onsubmit="event.preventDefault(); alert('Perfil atualizado com sucesso!');">
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label for="userName" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Nome Completo</label>
                                <input type="text" id="userName" class="form-control" value="Pato Vilo" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label for="userEmail" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">E-mail de Acesso</label>
                                <input type="email" id="userEmail" class="form-control" value="pato@ultracrm.com" required>
                            </div>
                            <div style="display: flex; justify-content: flex-end;">
                                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                            </div>
                        </form>
                    </div>

                    <!-- Password Settings -->
                    <div class="card-table" style="padding: 1.5rem; align-self: start;">
                        <div class="card-header" style="margin-bottom: 1.5rem; border-bottom: none; padding-bottom: 0;">
                            <h3 style="font-size: 1.25rem;">Alteração de Senha</h3>
                        </div>
                        <form onsubmit="event.preventDefault(); alert('Senha atualizada com sucesso!');">
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label for="currentPassword" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Senha Atual</label>
                                <input type="password" id="currentPassword" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 1rem;">
                                <label for="newPassword" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Nova Senha</label>
                                <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label for="confirmPassword" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Confirmar Nova Senha</label>
                                <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div style="display: flex; justify-content: flex-end;">
                                <button type="submit" class="btn btn-primary">Salvar Senha</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Chat Bubble Widget -->
    <script src="chat-bubble.js" defer></script>
</body>
</html>
